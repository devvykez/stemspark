<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEM Spark Pro</title>
<style>
:root{
--navy:#2F4156;--sky:#C8D9E6;--beige:#F5EFEB;--white:#fff;
--dark-bg:#0f1720;--dark-card:#1b2430;--dark-text:#e8eef6;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto}
body{background:var(--beige);color:var(--navy);transition:.3s}
body.dark{background:var(--dark-bg);color:var(--dark-text)}
header{display:flex;justify-content:space-between;padding:18px 36px;position:sticky;top:0;background:rgba(255,255,255,.6);backdrop-filter:blur(10px);z-index:10}
body.dark header{background:rgba(15,23,32,.6)}
nav a{margin:0 10px;cursor:pointer}
.btn{padding:10px 18px;border:none;border-radius:20px;background:var(--navy);color:#fff;cursor:pointer}
.page{display:none;padding:60px 20px}
.active{display:block}
.hero{text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:var(--white);padding:20px;border-radius:20px;transition:.3s}
body.dark .card{background:var(--dark-card)}
.card:hover{transform:translateY(-8px) scale(1.02)}
.search{padding:10px;border-radius:20px;width:260px;margin-top:15px}
footer{text-align:center;padding:20px}
.fade{opacity:0;transform:translateY(30px);transition:1s}
.show{opacity:1;transform:translateY(0)}
.progress{height:10px;background:#ccc;border-radius:10px;margin-top:10px}
.bar{height:10px;background:var(--navy);width:0;border-radius:10px}
</style>
</head>
<body>

<header>
<h2>STEM Spark</h2>
<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('lessons')">Lessons</a>
<a onclick="show('quiz')">Quiz</a>
<a onclick="show('resources')">Resources</a>
<a onclick="show('dashboard')">Dashboard</a>
</nav>
<button onclick="toggleMode()">🌙</button>
</header>

<section id="home" class="page active hero fade">
<h1>Explore. Innovate. Create.</h1>
<p>Pro-level STEM platform</p>
<input class="search" placeholder="Search lessons..." onkeyup="filter(this.value)">
</section>

<section id="lessons" class="page fade">
<div class="grid" id="lessonList">
<div class="card">Physics: Motion</div>
<div class="card">Math: Algebra</div>
<div class="card">Coding: JavaScript</div>
<div class="card">Research Writing</div>
</div>
</section>

<section id="quiz" class="page hero fade">
<h2 id="qText"></h2>
<div id="answers"></div>
<p id="result"></p>
<div class="progress"><div class="bar" id="bar"></div></div>
</section>

<section id="resources" class="page fade">
<div class="grid">
<div class="card">📄 Templates</div>
<div class="card">📊 Data Tools</div>
<div class="card">📚 Guides</div>
</div>
</section>

<section id="dashboard" class="page hero fade">
<h2>Student Dashboard</h2>
<p id="user"></p>
<p>Total Score: <span id="totalScore">0</span></p>
<button class="btn" onclick="login()">Simulate Login</button>
</section>

<footer>© 2026 STEM Spark Pro</footer>

<script>
function toggleMode(){document.body.classList.toggle('dark')}
function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active')}

// SCROLL ANIMATION
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('show')})
})
document.querySelectorAll('.fade').forEach(el=>observer.observe(el))

// SEARCH
function filter(val){
let cards=document.querySelectorAll('#lessonList .card')
cards.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val.toLowerCase())?'block':'none'
})
}

// QUIZ
const quiz=[
{q:"What is 2+2?",a:["3","4","5"],c:1},
{q:"Speed formula?",a:["d/t","t/d","m*v"],c:0},
{q:"Water formula?",a:["CO2","H2O","O2"],c:1}
]
let i=0,score=0

function loadQ(){
if(i>=quiz.length){
document.getElementById('qText').innerText="Finished! Score: "+score
localStorage.setItem('score',score)
document.getElementById('answers').innerHTML=""
updateDashboard()
return
}
let q=quiz[i]
document.getElementById('qText').innerText=q.q
let html=""
q.a.forEach((ans,index)=>{
html+=`<button class='btn' onclick='check(${index})'>${ans}</button><br><br>`
})
document.getElementById('answers').innerHTML=html
document.getElementById('bar').style.width=(i/quiz.length*100)+"%"
}
function check(ans){if(ans===quiz[i].c)score++;i++;loadQ()}
loadQ()

// LOGIN + DASHBOARD
function login(){
localStorage.setItem('user','STEM Student')
updateDashboard()
}
function updateDashboard(){
document.getElementById('user').innerText="User: "+(localStorage.getItem('user')||'Guest')
document.getElementById('totalScore').innerText=localStorage.getItem('score')||0
}
updateDashboard()
</script>

</body>
</html>
